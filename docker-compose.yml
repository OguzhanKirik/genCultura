services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gencultura
      POSTGRES_PASSWORD: gencultura
      POSTGRES_DB: gencultura
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gencultura"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gencultura:gencultura@db:5432/gencultura
      MEDIA_DIR: /media
    volumes:
      - media_data:/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      API_URL_INTERNAL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
